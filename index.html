<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infimind Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- SVG Filter for Organic Liquid Movement -->
    <svg class="hidden" xmlns="http://www.w3.org/2000/svg" style="display:none; position:absolute; width:0; height:0;">
      <filter id="fluid-filter">
        <feTurbulence baseFrequency="0.01 0.01" numOctaves="3" result="noise" type="fractalNoise">
          <animate attributeName="baseFrequency" dur="30s" repeatCount="indefinite" values="0.01 0.01; 0.015 0.02; 0.01 0.01" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
